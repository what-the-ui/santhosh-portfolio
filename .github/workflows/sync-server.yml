name: Sync nexus-server to Santhosh-Job-Tracker

on:
  push:
    branches: [main]
    paths:
      - 'nexus-server/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout santhosh-portfolio
        uses: actions/checkout@v4
        with:
          path: portfolio

      - name: Checkout Santhosh-Job-Tracker
        uses: actions/checkout@v4
        with:
          repository: what-the-ui/Santhosh-Job-Tracker
          token: ${{ secrets.SYNC_TOKEN }}
          path: job-tracker

      - name: Copy nexus-server files
        run: |
          rsync -av --delete --exclude='.git' nexus-server/ job-tracker/
          cd job-tracker
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: update from santhosh-portfolio"
            git push
          fi
